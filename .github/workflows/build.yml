name: Build AmneziaWG for Redmi AX3000 (hzyitc ipq50xx kernel 5.15.150)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libncurses5-dev python3 python3-distutils \
            python3-pyelftools unzip wget git rsync zlib1g-dev gawk \
            gettext libssl-dev file quilt

      - name: Download hzyitc SDK (ipq50xx kernel 5.15.150)
        run: |
          SDK_URL="https://github.com/hzyitc/openwrt-redmi-ax3000/releases/download/ci-ipq50xx-mainline-kernel-5.15-openwrt-23.05-20240724-153345-UTC/openwrt-sdk-ipq50xx-arm_gcc-12.3.0_musl_eabi.Linux-x86_64.tar.xz"
          wget -q --show-progress "$SDK_URL" -O sdk.tar.xz
          tar xf sdk.tar.xz
          SDK_DIR=$(ls -d $PWD/openwrt-sdk-*/ | head -1 | sed 's|/$||')
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "SDK at: $SDK_DIR"

      - name: Clone Slava-Shchipunov/awg-openwrt packages
        run: |
          # Use Slava's packages - his kmod Makefile downloads amneziawg-linux-kernel-module
          # as a standalone out-of-tree module (doesn't need kernel wireguard source)
          git clone --depth=1 https://github.com/Slava-Shchipunov/awg-openwrt.git /tmp/awg-src
          echo "=== awg-openwrt structure ==="
          ls -la /tmp/awg-src/

      - name: Install packages into SDK
        run: |
          for pkg in kmod-amneziawg amneziawg-tools luci-proto-amneziawg; do
            if [ -d "/tmp/awg-src/$pkg" ]; then
              cp -r "/tmp/awg-src/$pkg" "$SDK_DIR/package/"
              echo "Installed: $pkg"
            else
              echo "Not found: $pkg (skipping)"
            fi
          done

      - name: Update feeds (for dependencies)
        run: |
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure packages
        run: |
          cd "$SDK_DIR"
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          make defconfig

      - name: Build kmod-amneziawg
        run: |
          cd "$SDK_DIR"
          make package/kmod-amneziawg/compile V=s -j$(nproc)

      - name: Build amneziawg-tools
        run: |
          cd "$SDK_DIR"
          make package/amneziawg-tools/compile V=s -j$(nproc)

      - name: Build luci-proto-amneziawg
        run: |
          cd "$SDK_DIR"
          make package/luci-proto-amneziawg/compile V=s -j$(nproc) || \
            echo "LuCI build failed (non-critical), continuing"

      - name: Collect .ipk packages
        run: |
          mkdir -p artifacts
          find "$SDK_DIR/bin" -name "*.ipk" | while read f; do
            name=$(basename "$f")
            if echo "$name" | grep -qiE "amnezia|awg"; then
              cp "$f" artifacts/
              echo "Collected: $name"
            fi
          done
          echo "=== Collected packages ==="
          ls -la artifacts/
          [ "$(ls -A artifacts/)" ] || { echo "ERROR: No packages found!"; exit 1; }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-redmi-ax3000-ipq50xx-arm
          path: artifacts/
          retention-days: 30
